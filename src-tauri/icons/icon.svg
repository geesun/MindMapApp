<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Light background: near-white with a hint of blue-lavender -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef0ff"/>
      <stop offset="100%" stop-color="#dde5ff"/>
    </linearGradient>

    <!-- Center node: medium indigo -->
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Satellite nodes: soft periwinkle-blue -->
    <linearGradient id="sat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Subtle drop shadow on center node -->
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#6366f1" flood-opacity="0.22"/>
    </filter>

    <!-- Soft glow on satellites -->
    <filter id="sat-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Very subtle inner border -->
  <rect width="512" height="512" rx="110" fill="none"
        stroke="rgba(99,102,241,0.12)" stroke-width="1.5"/>

  <!-- ── Connector lines (behind nodes) ── -->
  <!-- Top -->
  <line x1="256" y1="214" x2="256" y2="140"
        stroke="#818cf8" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <!-- Top-right -->
  <line x1="289" y1="227" x2="351" y2="165"
        stroke="#818cf8" stroke-width="9" stroke-linecap="round" opacity="0.38"/>
  <!-- Bottom-right -->
  <line x1="296" y1="272" x2="368" y2="336"
        stroke="#818cf8" stroke-width="9" stroke-linecap="round" opacity="0.38"/>
  <!-- Bottom -->
  <line x1="256" y1="298" x2="256" y2="372"
        stroke="#818cf8" stroke-width="9" stroke-linecap="round" opacity="0.45"/>
  <!-- Bottom-left -->
  <line x1="223" y1="272" x2="144" y2="336"
        stroke="#818cf8" stroke-width="9" stroke-linecap="round" opacity="0.38"/>
  <!-- Top-left -->
  <line x1="216" y1="227" x2="161" y2="165"
        stroke="#818cf8" stroke-width="9" stroke-linecap="round" opacity="0.38"/>

  <!-- ── Satellite nodes ── -->
  <!-- Top -->
  <circle cx="256" cy="114" r="28" fill="url(#sat)" filter="url(#sat-shadow)" opacity="0.92"/>
  <!-- Top-right -->
  <circle cx="374" cy="144" r="24" fill="url(#sat)" filter="url(#sat-shadow)" opacity="0.78"/>
  <!-- Bottom-right -->
  <circle cx="390" cy="352" r="24" fill="url(#sat)" filter="url(#sat-shadow)" opacity="0.78"/>
  <!-- Bottom -->
  <circle cx="256" cy="398" r="28" fill="url(#sat)" filter="url(#sat-shadow)" opacity="0.92"/>
  <!-- Bottom-left -->
  <circle cx="122" cy="352" r="24" fill="url(#sat)" filter="url(#sat-shadow)" opacity="0.78"/>
  <!-- Top-left -->
  <circle cx="138" cy="144" r="24" fill="url(#sat)" filter="url(#sat-shadow)" opacity="0.78"/>

  <!-- ── Central node ── -->
  <circle cx="256" cy="256" r="48" fill="url(#center)" filter="url(#shadow)"/>

  <!-- White inner ring on center node (modern glassmorphism touch) -->
  <circle cx="256" cy="256" r="48" fill="none"
          stroke="rgba(255,255,255,0.35)" stroke-width="3"/>

  <!-- White dot highlight -->
  <circle cx="240" cy="240" r="10" fill="rgba(255,255,255,0.28)"/>
</svg>
